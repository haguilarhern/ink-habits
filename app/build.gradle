apply plugin: 'com.android.application'
android {
    namespace 'com.boox.atomic.habits'
    compileSdk 31
    defaultConfig {
        applicationId 'com.boox.atomic.habits'
        minSdk 28; targetSdk 31; versionCode 1; versionName '1.0.0'
    }
    buildTypes { release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' } }
    compileOptions { sourceCompatibility JavaVersion.VERSION_11; targetCompatibility JavaVersion.VERSION_11 }
}
dependencies {
    implementation 'com.onyx.android.sdk:onyxsdk-device:1.4.3.7'
    implementation 'com.onyx.android.sdk:onyxsdk-pen:1.4.11'
    implementation 'com.onyx.android.sdk:onyxsdk-scribble:1.0.8'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.ink:ink-brush:1.0.0'
    implementation 'androidx.ink:ink-authoring:1.0.0'
    implementation 'androidx.ink:ink-geometry:1.0.0'
}